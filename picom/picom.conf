# Picom Configuration for Qtile
# Fixes cursor disappearing issues and provides smooth compositing

#################################
#          Backend              #
#################################

# Backend to use: "xrender", "glx", or "egl"
# GLX backend is generally faster but may have cursor issues
# xrender is more stable for cursor handling
backend = "glx";

# Enable/disable VSync
vsync = true;

#################################
#       General Settings        #
#################################

# Daemonize process
daemon = true;

# Use damage information to help limit the area to paint
# Setting to false can help with cursor visibility issues
use-damage = true;

#################################
#           Shadows             #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Exclude shadows on some windows
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'firefox' && argb"
];

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#   Transparency / Opacity      #
#################################

inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Opacity rules
opacity-rule = [
    "95:class_g = 'URxvt' && focused",
    "85:class_g = 'URxvt' && !focused",
    "95:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused"
];

#################################
#     Background-Blurring       #
#################################

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################

# Specify refresh rate of the screen (0 = auto)
refresh-rate = 0;

# Try to detect WM windows and mark them as active
mark-wmwin-focused = true;

# Mark all non-WM but override-redirect windows active
mark-ovredir-focused = true;

# Use EWMH _NET_WM_ACTIVE_WINDOW to determine which window is focused
# instead of using FocusIn/Out events
use-ewmh-active-win = true;

# Detect rounded corners and treat them as rectangular
detect-rounded-corners = true;

# Detect _NET_WM_OPACITY on client windows
detect-client-opacity = true;

# GLX backend: Avoid using stencil buffer
glx-no-stencil = true;

# GLX backend: Avoid rebinding pixmap on window damage
glx-no-rebind-pixmap = true;

# Disable the use of damage information
# Set to true if cursor disappears
# glx-use-damage = false;

# Window type settings
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};
